name: Build and Release NatureOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}
      tag: ${{ steps.version.outputs.tag }}
      ver_short: ${{ steps.version.outputs.ver_short }}
      build: ${{ steps.version.outputs.build }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y nasm python3 python3-pip
          pip3 install pycdlib

      - name: Read version and build from version.inc (VERBOSE)
        id: version
        run: |
          set -euxo pipefail

          echo "=== Reading version.inc ==="
          cat include/version.inc
          echo "==========================="

          extract() {
            grep "$1" include/version.inc | head -n 1 | awk -F'"' '{print $2}' | tr -d '\r'
          }

          VERSION=$(extract '%define OS_VERSION')
          CHANNEL=$(extract '%define RELEASE_CHANNEL')
          VER_SHORT=$(extract '%define OS_VER_SHORT')
          OS_BUILD=$(extract '%define OS_BUILD')

          echo "DEBUG RAW VALUES:"
          echo "VERSION    = [$VERSION]"
          echo "CHANNEL    = [$CHANNEL]"
          echo "VER_SHORT  = [$VER_SHORT]"
          echo "OS_BUILD   = [$OS_BUILD]"

          # Hard validation
          if [ -z "$VERSION" ] || [ -z "$CHANNEL" ] || [ -z "$VER_SHORT" ] || [ -z "$OS_BUILD" ]; then
            echo "ERROR: Missing required version fields"
            exit 1
          fi

          TAG="v$OS_BUILD"

          echo "FINAL TAG: $TAG"

          {
            echo "version=$VERSION"
            echo "channel=$CHANNEL"
            echo "ver_short=$VER_SHORT"
            echo "build=$OS_BUILD"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

          echo "Detected version: $VER_SHORT ($CHANNEL), build: $OS_BUILD"

      - name: Build ISO and data.img
        run: |
          set -euxo pipefail
          make all

      - name: Verify build artifacts exist
        run: |
          set -euxo pipefail

          echo "Checking artifacts..."
          ls -lah

          test -f natureos.iso || (echo "ERROR: natureos.iso not found" && exit 1)
          test -f data.img     || (echo "ERROR: data.img not found" && exit 1)

          echo "ISO size: $(du -h natureos.iso | cut -f1)"
          echo "IMG size: $(du -h data.img | cut -f1)"

      - name: Read changelog (VERBOSE SAFE)
        id: changelog
        run: |
          set -euxo pipefail

          echo "=== Changelog ==="
          cat .github/changelog.md

          {
            echo "body<<EOF"
            cat .github/changelog.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          TAG_NAME="${{ steps.version.outputs.tag }}"
          echo "Checking release: $TAG_NAME"

          if gh release view "$TAG_NAME" --repo ${{ github.repository }} &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release does not exist"
          fi

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ steps.version.outputs.ver_short }}
          tag_name: ${{ steps.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.body }}

            ---
            ## Downloads
            `natureos.iso` | Bootable ISO image  
            `data.img`     | Data disk image  

            ## Running with QEMU (every feature tested)
            ```
            qemu-system-x86_64 ^
            -cdrom natureos.iso ^
            -drive format=raw,file=data.img,if=ide,index=3 ^
            -boot d ^
            -m 128M ^
            -cpu qemu64 ^
            -smp 1 ^
            -vga std ^
            -rtc base=localtime ^
            -audiodev id=snd,driver=dsound ^
            -machine pcspk-audiodev=snd ^
            -nic user,model=e1000 ^
            -display sdl,window-close=on ^
            -name "NatureOS" ^
            -serial stdio ^
            -no-reboot
            ```
          files: |
            natureos.iso
            data.img
          prerelease: ${{ steps.version.outputs.channel != 'stable' }}
