name: Build and Release NatureOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}
      tag: ${{ steps.version.outputs.tag }}
      ver_short: ${{ steps.version.outputs.ver_short }}
      build: ${{ steps.version.outputs.build }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm xorriso python3

      - name: Read version and build from version.inc
        id: version
        run: |
          set -e

          extract() {
            grep "$1" include/version.inc | grep -oP '".*?"' | tr -d '"' || true
          }

          VERSION=$(extract '%define OS_VERSION ')
          CHANNEL=$(extract '%define RELEASE_CHANNEL')
          VER_SHORT=$(extract '%define OS_VER_SHORT')
          OS_BUILD=$(extract '%define OS_BUILD')

          # Fail if anything important is missing
          [ -z "$VERSION" ] && echo "Missing OS_VERSION" && exit 1
          [ -z "$CHANNEL" ] && echo "Missing RELEASE_CHANNEL" && exit 1
          [ -z "$VER_SHORT" ] && echo "Missing OS_VER_SHORT" && exit 1
          [ -z "$OS_BUILD" ] && echo "Missing OS_BUILD" && exit 1

          {
            echo "version=$VERSION"
            echo "channel=$CHANNEL"
            echo "ver_short=$VER_SHORT"
            echo "build=$OS_BUILD"
            echo "tag=v$OS_BUILD"
          } >> "$GITHUB_OUTPUT"

          echo "Detected version: $VER_SHORT ($CHANNEL), build: $OS_BUILD"

      - name: Build ISO and data.img
        run: make all

      - name: Verify build artifacts exist
        run: |
          test -f natureos.iso || (echo "ERROR: natureos.iso not found" && exit 1)
          test -f data.img     || (echo "ERROR: data.img not found" && exit 1)
          echo "natureos.iso: $(du -h natureos.iso | cut -f1)"
          echo "data.img:     $(du -h data.img | cut -f1)"

      - name: Read changelog
        id: changelog
        run: |
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          cat .github/changelog.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists (by build tag)
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG_NAME" --repo ${{ github.repository }} &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG_NAME already exists – skipping creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ steps.version.outputs.ver_short }}
          tag_name: ${{ steps.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.body }}

            ---
            ## Downloads
            `natureos.iso` | Bootable ISO image  
            `data.img`     | Data disk image  

            ## Running with QEMU (every feature tested)
            ```
            qemu-system-x86_64 ^
            -cdrom natureos.iso ^
            -drive format=raw,file=data.img,if=ide,index=3 ^
            -boot d ^
            -m 128M ^
            -cpu qemu64 ^
            -smp 1 ^
            -vga std ^
            -rtc base=localtime ^
            -audiodev id=snd,driver=dsound ^
            -machine pcspk-audiodev=snd ^
            -nic user,model=e1000 ^
            -display sdl,window-close=on ^
            -name "NatureOS" ^
            -serial stdio ^
            -no-reboot
            ```
          files: |
            natureos.iso
            data.img
          prerelease: ${{ steps.version.outputs.channel != 'stable' }}
