name: Build and Release NatureOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}
      tag:     ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm xorriso python3

      - name: Read version from version.inc
        id: version
        run: |
          VERSION=$(grep '%define OS_BUILD' include/version.inc | grep -oP '".*?"' | tr -d '"')
          CHANNEL=$(grep '%define RELEASE_CHANNEL' include/version.inc | grep -oP '".*?"' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION ($CHANNEL)"

      - name: Build ISO and data.img
        run: make all

      - name: Verify build artifacts exist
        run: |
          test -f natureos.iso || (echo "ERROR: natureos.iso not found" && exit 1)
          test -f data.img     || (echo "ERROR: data.img not found"     && exit 1)
          echo "natureos.iso: $(du -h natureos.iso | cut -f1)"
          echo "data.img:     $(du -h data.img     | cut -f1)"

      - name: Read changelog
        id: changelog
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat .github/changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NatureOS v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || steps.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.body }}
            ---
            ## Downloads
            `natureos.iso` | Bootable ISO image
            `data.img` | Data disk image
            ## Running with QEMU (every feature tested)
            ```
            qemu-system-x86_64 ^
            -cdrom natureos.iso ^
            -drive format=raw,file=data.img,if=ide,index=3 ^
            -boot d ^
            -m 128M ^
            -cpu qemu64 ^
            -smp 1 ^
            -vga std ^
            -rtc base=localtime ^
            -audiodev id=snd,driver=dsound ^
            -machine pcspk-audiodev=snd ^
            -nic user,model=e1000 ^
            -display sdl,window-close=on ^
            -name "NatureOS" ^
            -serial stdio ^
            -no-reboot
            ```
          files: |
            natureos.iso
            data.img
          prerelease: ${{ steps.version.outputs.channel != 'stable' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}